appId: com.hexacore.browser
productName: HexaCore
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
asarUnpack:
  # node-sqlite3-wasm ships a .wasm binary that must live outside the asar archive
  - "**/node_modules/node-sqlite3-wasm/**"
win:
  target: [nsis]
  icon: build/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: HexaCore
  installerHeaderIcon: build/icon.ico
  deleteAppDataOnUninstall: false
# Auto-update feed. Point this at your GitHub releases (or a generic URL) and
# `electron-builder` will publish update metadata that the in-app updater reads.
publish:
  - provider: github
    owner: DeadToxic101
    repo: Hexacore
# For a self-hosted feed instead, swap the block above for:
#   - provider: generic
#     url: https://downloads.hexacore.app/updates/
mac:
  target: [dmg]
  category: public.app-category.utilities
  icon: build/icon.icns
linux:
  target: [AppImage, deb]
  category: Network
  icon: build/icon.png
